  <style>
    :root {
      --black:       #080a0e;
      --black-card:  #0d1117;
      --black-soft:  #111620;
      --blue:        #1a6eff;
      --blue-light:  #4d93ff;
      --blue-glow:   rgba(26,110,255,0.35);
      --red:         #e8132a;
      --red-hover:   #ff1f38;
      --red-glow:    rgba(232,19,42,0.45);
      --white:       #f0f4ff;
      --white-dim:   #9ba8c0;
      --border:      rgba(26,110,255,0.18);
      --font-display: 'Bebas Neue', sans-serif;
      --font-body:    'Barlow', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: var(--font-body);
      font-size: 17px;
      line-height: 1.65;
      overflow-x: hidden;
    }

    /* ── NOISE TEXTURE ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: .5;
    }

    /* ── LAYOUT ── */
    .container { max-width: 960px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 1; }
    section { padding: 80px 0; }

    /* ── FADE-IN ── */
    .fade-in { opacity: 0; transform: translateY(28px); transition: opacity .7s ease, transform .7s ease; }
    .fade-in.visible { opacity: 1; transform: none; }

    /* ── DIVIDER ── */
    .section-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--blue), transparent);
      opacity: .4;
      margin: 0 auto;
      max-width: 600px;
    }

    /* ─────────────────────────────────────────
       TOP BAR
    ───────────────────────────────────────── */
    .topbar {
      background: linear-gradient(90deg, var(--red) 0%, #b00820 100%);
      text-align: center;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: .6px;
      position: relative; z-index: 10;
    }

    /* ─────────────────────────────────────────
       HERO
    ───────────────────────────────────────── */
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding: 100px 0 80px;
      background:
        radial-gradient(ellipse 70% 55% at 50% 0%, rgba(26,110,255,.15) 0%, transparent 70%),
        var(--black);
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: '';
      position: absolute;
      bottom: -2px; left: 0; right: 0;
      height: 120px;
      background: linear-gradient(to bottom, transparent, var(--black));
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
    }

    .hero-tag {
      display: inline-block;
      background: rgba(26,110,255,.12);
      border: 1px solid var(--blue);
      color: var(--blue-light);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 40px;
      margin-bottom: 24px;
    }

    .hero h1 {
      font-family: var(--font-display);
      font-size: clamp(36px, 5vw, 58px);
      line-height: 1.08;
      letter-spacing: 1.5px;
      margin-bottom: 24px;
    }
    .hero h1 span { color: var(--blue-light); }

    .hero-sub {
      font-size: 18px;
      color: var(--white-dim);
      margin-bottom: 32px;
      max-width: 480px;
    }

    .hero-price {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(26,110,255,.08);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 20px;
      margin-bottom: 32px;
      font-size: 18px;
      font-weight: 600;
    }
    .hero-price i { color: var(--blue-light); }

    /* product image */
    .hero-visual {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .product-img-wrap {
      position: relative;
      width: 100%;
      max-width: 380px;
    }

    .product-img-wrap::before {
      content: '';
      position: absolute;
      inset: -20px;
      background: radial-gradient(ellipse at center, var(--blue-glow) 0%, transparent 70%);
      border-radius: 24px;
      filter: blur(30px);
      z-index: 0;
    }

    .product-placeholder {
      position: relative;
      z-index: 1;
      width: 100%;
      aspect-ratio: 3/4;
      background: linear-gradient(145deg, var(--black-card), var(--black-soft));
      border: 1px solid var(--border);
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      box-shadow:
        0 0 0 1px rgba(26,110,255,.1),
        0 30px 80px rgba(0,0,0,.7),
        inset 0 1px 0 rgba(255,255,255,.05);
      transform: perspective(800px) rotateY(-6deg) rotateX(3deg);
      transition: transform .4s ease;
      background-image: url('https://i.imgur.com/fwJBzIJ.jpeg'); /* substituição do produto */
      background-size: cover;
      background-position: center;
    }
    .product-placeholder:hover {
      transform: perspective(800px) rotateY(0deg) rotateX(0deg);
    }

    /* AUTORIDADE */
    .author-placeholder {
      flex-shrink: 0;
      width: 160px; height: 160px;
      border-radius: 50%;
      background-image: url('https://i.imgur.com/WD07rqN.jpeg'); /* substituição do autor */
      background-size: cover;
      background-position: center;
      border: 2px solid var(--blue);
      display: flex; align-items: center; justify-content: center;
      font-size: 60px;
      color: var(--blue);
      box-shadow: 0 0 40px var(--blue-glow);
      position: relative;
      overflow: hidden;
    }

    /* o resto do CSS e HTML permanece igual ao original */

  </style>
</head>
